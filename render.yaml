services:
  - type: web
    name: chessox-frontend
    env: node
    rootDir: frontend_next
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://chessox-demo.onrender.com
  
  - type: web
    name: chessox-demo
    env: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    plan: free
