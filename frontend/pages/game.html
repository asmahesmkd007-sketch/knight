<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game – PHOENIX X</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    .game-layout { display: flex; gap: 20px; align-items: flex-start; }
    .board-section { flex-shrink: 0; }
    .side-panel { flex: 1; display: flex; flex-direction: column; gap: 16px; min-width: 260px; }
    .player-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; }
    .player-bar.active { border-color: #5bc0eb; background: rgba(91,192,235,0.06); }
    .player-timer { font-family: var(--font-display); font-size: 24px; font-weight: 700; color: #5bc0eb; margin-left: auto; }
    .player-timer.low { color: var(--error); animation: pulse-red 1s infinite; }
    .move-list { height: 200px; overflow-y: auto; padding: 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; }
    .move-item { display: inline-block; padding: 3px 8px; font-family: monospace; font-size: 12px; color: var(--text-secondary); }
    .move-number { color: var(--text-muted); font-size: 11px; }
    .game-result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 500; align-items: center; justify-content: center; }
    .game-result-overlay.active { display: flex; }
    .result-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 400px; }
    .result-icon { font-size: 60px; margin-bottom: 16px; }
    .result-title { font-family: var(--font-display); font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    .result-iq { font-size: 16px; color: var(--text-secondary); margin-bottom: 24px; }
    #board { width: min(500px, 90vw); }
    .highlight-selected { background: rgba(255, 107, 53, 0.4) !important; }
    .highlight-move { cursor: pointer; position: relative; }
    .highlight-move::after { content:''; display:block; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:30%; height:30%; background:rgba(0,0,0,0.2); border-radius:50%; }
    .chat-card { display: flex; flex-direction: column; flex: 1; max-height: 280px; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.02); border-radius: 8px; font-size: 12px; }
    .chat-messages::-webkit-scrollbar { width: 3px; }
    .msg { padding: 8px 12px; border-radius: 12px; max-width: 90%; word-break: break-word; }
    .msg.system { background: rgba(0,0,0,0.05); color: var(--text-muted); align-self: center; font-size: 11px; font-style: italic; text-align: center; max-width: 100%; border-radius: 4px; padding: 4px 8px; }
    .msg.me { background: rgba(0, 161, 155, 0.15); color: var(--teal); align-self: flex-end; border-bottom-right-radius: 2px; }
    .msg.opp { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg-name { font-size: 10px; font-weight: 700; margin-bottom: 2px; opacity: 0.8; }
    .chat-input-wrap { display: flex; gap: 8px; margin-top: 12px; }
    .chat-input-wrap input { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color 0.2s; }
    .chat-input-wrap input:focus { border-color: var(--teal); }
    .chat-input-wrap button { width: 38px; border-radius: 8px; border: none; background: var(--teal); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
    .chat-input-wrap button:hover { opacity: 0.9; transform: scale(1.05); }
    .chat-input-wrap button:active { transform: scale(0.95); }
    @media (max-width: 900px) { .game-layout { flex-direction: column; } .side-panel { width: 100%; } }
    .highlight-last-move { background: rgba(255, 255, 0, 0.4) !important; }
    .highlight-check { animation: blink-red 0.8s infinite; background: rgba(255, 0, 0, 0.6) !important; box-shadow: inset 0 0 15px rgba(255,0,0,0.8); }
    @keyframes blink-red {
      0%, 100% { background: rgba(255, 0, 0, 0.6) !important; }
      50% { background: rgba(255, 0, 0, 0.2) !important; }
    }
    .promotion-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .promotion-content { background: var(--bg-secondary); padding: 20px; border-radius: 12px; text-align: center; }
    .promotion-options { display: flex; gap: 10px; margin-top: 15px; }
    .promotion-piece { cursor: pointer; padding: 10px; border-radius: 8px; transition: background 0.2s; }
    .promotion-piece:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title" id="game-title"><i class="fa-solid fa-chess-pawn"></i> CHESS GAME</div>
        <div class="live-badge"><div class="live-dot"></div> LIVE</div>
      </div>
      <div class="topbar-right" style="gap:8px">
        <button id="btn-undo" class="btn btn-secondary btn-sm" style="display:none; padding: 6px 12px;" onclick="undoMove()"><i class="fa-solid fa-rotate-left"></i> Undo</button>
        <button class="btn btn-danger btn-sm" style="padding: 6px 12px;" onclick="resignGame()"><i class="fa-solid fa-flag"></i> Resign</button>
      </div>
    </div>
    <div class="page-content">
      <div class="game-layout">
        <div class="board-section">
          <div class="player-bar mb-16" id="opponent-bar">
            <div class="avatar-initial" id="opp-avatar">?</div>
            <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
              <div style="display:flex;align-items:center;gap:8px">
                 <div style="font-weight:600" id="opp-name">Opponent</div>
                 <div style="font-size:11px;color:var(--text-muted)" id="opp-iq">IQ: ...</div>
              </div>
              <div id="opp-captured" style="display:flex;align-items:center;margin-top:2px;font-size:14px;color:var(--text-secondary);min-height:16px"></div>
              <div id="bot-thinking" style="display:none;font-size:10px;color:var(--teal);margin-top:2px"><i class="fa-solid fa-microchip fa-spin"></i> Bot is thinking...</div>
            </div>
            <div class="player-timer" id="opp-timer">5:00</div>
          </div>

          <!-- Chess Board -->
          <div id="board"></div>

          <div class="player-bar" id="my-bar" style="margin-top:16px">
            <div class="avatar-initial" id="my-avatar">P</div>
            <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
              <div style="display:flex;align-items:center;gap:8px">
                <div style="font-weight:600" id="my-name">You</div>
                <div style="font-size:11px;color:var(--text-muted)" id="my-iq">IQ: ...</div>
              </div>
              <div id="my-captured" style="display:flex;align-items:center;margin-top:2px;font-size:14px;color:var(--text-secondary);min-height:16px"></div>
            </div>
            <div class="player-timer" id="my-timer">5:00</div>
          </div>
        </div>

        <!-- Side Panel -->
        <div class="side-panel">
          <div class="card">
            <div class="card-title">Move History</div>
            <div class="move-list" id="move-list"></div>
          </div>

          <div class="card chat-card">
            <div class="card-title" style="margin-bottom:8px"><i class="fa-solid fa-comments"></i> In-Game Chat</div>
            <div class="chat-messages" id="chat-messages">
                <div class="msg system">GLHF! Keep chat respectful!</div>
            </div>
            <div class="chat-input-wrap">
              <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendChatMessage()">
              <button onclick="sendChatMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="game-result-overlay" id="result-overlay">
  <div class="result-card">
    <div class="result-icon" id="result-icon"><i class="fa-solid fa-chess-pawn"></i></div>
    <div class="result-title" id="result-title">Game Over</div>
    <div class="result-iq" id="result-iq"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="/pages/play.html" class="btn btn-primary">Play Again</a>
      <a href="/pages/dashboard.html" class="btn btn-secondary">Dashboard</a>
      <a href="/pages/history.html" class="btn btn-secondary">Match History</a>
    </div>
  </div>
</div>

<!-- PROMOTION MODAL -->
<div id="promotion-modal" class="promotion-modal">
  <div class="promotion-content">
    <div class="promotion-title">Select Promotion Piece</div>
    <div class="promotion-options" id="promotion-options"></div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/socket.js"></script>
<script>
if (!requireAuth()) throw new Error();
const user = getUser();
loadSidebar();

const params = new URLSearchParams(window.location.search);
const matchId = params.get('matchId') || localStorage.getItem('px_active_match');
const isTournament = params.get('tr') === '1';
const tId = params.get('tId');

if (matchId) localStorage.setItem('px_active_match', matchId);

const matchData = JSON.parse(localStorage.getItem('px_match') || '{}');
const mode = params.get('mode') || matchData.mode || 'random';
let myColor = matchData.color || 'white'; 
const opponentData = matchData.opponent || {};
const botIQ = parseInt(params.get('iq') || localStorage.getItem('px_bot_iq') || '100');
let timerType = matchData.timer || 1;

let chess = new Chess();
let board = null;
let myTime = timerType * 60;
let oppTime = timerType * 60;
let timerInterval = null;
let gameActive = false;
let moveCount = 0;
let selectedSquare = null;

// Check for tournament elimination
if (isTournament && tId) {
    TournamentAPI.getById(tId).then(res => {
        if (res?.success && res.tournament.players) {
            const myP = res.tournament.players.find(p => (p.user_id?.id || p.user_id) === user.id);
            if (myP && myP.status === 'eliminated') {
                showEliminationOverlay();
            }
        }
    });
}

function showEliminationOverlay() {
    gameActive = false;
    document.getElementById('result-overlay').classList.add('active');
    document.getElementById('result-icon').innerHTML = '<i class="fa-solid fa-skull-crossbones"></i>';
    document.getElementById('result-title').textContent = 'ELIMINATED';
    document.getElementById('result-title').style.color = 'var(--error)';
    document.getElementById('result-iq').textContent = 'You have been knocked out of this tournament.';
    document.querySelector('.topbar-right').style.display = 'none';
    if (board) board.draggable = false;
}

function removeHighlights() {
  $('#board .square-55d63').removeClass('highlight-move highlight-selected');
}

function updateLastMoveHighlight(from, to) {
  $('#board .square-55d63').removeClass('highlight-last-move highlight-check');
  
  // Highlight last move
  if (from && to) {
    $('.square-' + from).addClass('highlight-last-move');
    $('.square-' + to).addClass('highlight-last-move');
  } else {
    const hist = chess.history({ verbose: true });
    if (hist.length > 0) {
      const last = hist[hist.length - 1];
      $('.square-' + last.from).addClass('highlight-last-move');
      $('.square-' + last.to).addClass('highlight-last-move');
    }
  }

  // Highlight King if in check
  if (chess.in_check()) {
    const kingColor = chess.turn(); 
    let kingSquare = null;
    chess.board().forEach((row, rowIndex) => {
      row.forEach((piece, colIndex) => {
        if (piece && piece.type === 'k' && piece.color === kingColor) {
          kingSquare = String.fromCharCode(97 + colIndex) + (8 - rowIndex);
        }
      });
    });
    if (kingSquare) $('.square-' + kingSquare).addClass('highlight-check');
  }
}

function highlightSquare(square, type) {
  $('#board .square-' + square).addClass('highlight-' + type);
}

function executeMove(from, to, promotion) {
  const move = chess.move({ from, to, promotion });
  if (move === null) return false;
  
  removeHighlights();
  selectedSquare = null;
  board.position(chess.fen());
  setTimeout(() => updateLastMoveHighlight(move.from, move.to), 250);
  
  addMoveToList(move.san);
  updatePlayerBar();
  
  if (mode === 'bot') {
    if (chess.game_over()) { showResult(); saveBotMatch(); return true; }
    const thinkingEl = document.getElementById('bot-thinking');
    if (thinkingEl) thinkingEl.style.display = 'block';
    setTimeout(makeBotMove, 1000 + Math.random() * 1000);
  } else {
    SocketActions.makeMove(matchId, { from: move.from, to: move.to, promotion }, user.id);
    if (chess.game_over()) showResult();
  }
  return true;
}

function makeBotMove() {
  const thinkingEl = document.getElementById('bot-thinking');
  if (thinkingEl) thinkingEl.style.display = 'none';
  if (!gameActive || chess.game_over()) return;

  const moves = chess.moves();
  if (moves.length === 0) return;

  let selectedMove;
  // Bot Intelligence based on IQ
  if (botIQ >= 1000) {
      // IQ 1000+: Prioritize captures and checks
      const captureMoves = moves.filter(m => m.includes('x'));
      const checkMoves = moves.filter(m => m.includes('+'));
      if (captureMoves.length > 0 && Math.random() > 0.3) {
          selectedMove = captureMoves[Math.floor(Math.random() * captureMoves.length)];
      } else if (checkMoves.length > 0 && Math.random() > 0.5) {
          selectedMove = checkMoves[Math.floor(Math.random() * checkMoves.length)];
      } else {
          selectedMove = moves[Math.floor(Math.random() * moves.length)];
      }
  } else {
      // Basic Bot: Random move
      selectedMove = moves[Math.floor(Math.random() * moves.length)];
  }

  const move = chess.move(selectedMove);
  board.position(chess.fen());
  addMoveToList(move.san);
  updatePlayerBar();
  setTimeout(() => updateLastMoveHighlight(move.from, move.to), 250);

  if (chess.game_over()) {
    showResult();
    saveBotMatch();
  }
}

async function saveBotMatch() {
    try {
        const result = chess.in_checkmate() ? (chess.turn() === 'w' ? 'player2_win' : 'player1_win') : 'draw';
        await GameAPI.saveBotMatch(result, chess.fen());
    } catch (err) { console.error('Error saving bot match:', err); }
}

let pendingMove = null;
function handlePromotion(source, target) {
  pendingMove = { from: source, to: target };
  const modal = document.getElementById('promotion-modal');
  const options = document.getElementById('promotion-options');
  options.innerHTML = '';
  
  const color = chess.turn(); 
  const pieces = ['q', 'r', 'b', 'n'];

  pieces.forEach(p => {
    const el = document.createElement('div');
    el.className = 'promotion-piece';
    const pieceImg = `https://chessboardjs.com/img/chesspieces/wikipedia/${color}${p.toUpperCase()}.png`;
    el.innerHTML = `<img src="${pieceImg}" width="45">`;
    el.onclick = () => selectPromotion(p);
    options.appendChild(el);
  });
  
  modal.style.display = 'flex';
}

function selectPromotion(piece) {
  document.getElementById('promotion-modal').style.display = 'none';
  if (pendingMove) {
    executeMove(pendingMove.from, pendingMove.to, piece);
    pendingMove = null;
  }
}

$(document).on('mousedown touchstart', '#board .square-55d63', function(e) {
  if (!gameActive || chess.game_over()) return;
  const square = $(this).attr('data-square');
  
  if (selectedSquare && selectedSquare !== square) {
    const moves = chess.moves({ square: selectedSquare, verbose: true });
    const move = moves.find(m => m.to === square);
    if (move) {
      if (move.flags.includes('p')) {
        handlePromotion(selectedSquare, square);
      } else {
        executeMove(selectedSquare, square, 'q');
      }
      return;
    }
  }

  const piece = chess.get(square);
  const myColorChar = myColor === 'white' ? 'w' : 'b';
  if (piece && piece.color === myColorChar) {
    removeHighlights();
    selectedSquare = square;
    highlightSquare(square, 'selected');
    const moves = chess.moves({ square: square, verbose: true });
    moves.forEach(m => highlightSquare(m.to, 'move'));
  } else {
    removeHighlights();
    selectedSquare = null;
  }
});

// Setup UI
document.getElementById('my-name').textContent = fmt.username(user.username);
document.getElementById('my-avatar').textContent = (user.username || 'P').replace('@', '')[0].toUpperCase();
document.getElementById('my-iq').textContent = 'IQ: ' + user.iq_level;

if (mode === 'bot') {
  const customName = localStorage.getItem('px_bot_name') || 'Bot Engine';
  document.getElementById('opp-name').innerHTML = `${escapeHTML(customName)} <i class="fa-solid fa-robot" style="margin-left:4px;color:var(--text-secondary)"></i>`;
  document.getElementById('opp-avatar').innerHTML = '<i class="fa-solid fa-microchip"></i>';
  document.getElementById('opp-iq').textContent = 'IQ: ' + botIQ;
  document.getElementById('my-timer').style.display = 'none';
  document.getElementById('opp-timer').style.display = 'none';
} else if (opponentData.username) {
  document.getElementById('opp-name').textContent = fmt.username(opponentData.username);
  document.getElementById('opp-avatar').textContent = (opponentData.username || '?').replace('@', '')[0].toUpperCase();
}

function initBoard() {
  board = Chessboard('board', {
    draggable: true,
    moveSpeed: 'slow',
    snapbackSpeed: 500,
    snapSpeed: 100,
    position: 'start',
    orientation: myColor,
    pieceTheme: function(piece) { return 'https://www.chess.com/chess-themes/pieces/neo/150/' + piece.toLowerCase() + '.png'; },
    onDragStart: onDragStart,
    onDrop: onDrop,
    onSnapEnd: onSnapEnd,
    onMoveEnd: () => updateLastMoveHighlight()
  });
}

function onDragStart(source, piece) {
  if (!gameActive || chess.game_over()) return false;
  const myColorChar = myColor === 'white' ? 'w' : 'b';
  if (chess.turn() !== myColorChar || piece.charAt(0) !== myColorChar) return false;
  removeHighlights();
  selectedSquare = source;
  highlightSquare(source, 'selected');
  const moves = chess.moves({ square: source, verbose: true });
  moves.forEach(m => highlightSquare(m.to, 'move'));
}

function onDrop(source, target) {
  if (source === target) return;
  const moves = chess.moves({ square: source, verbose: true });
  const move = moves.find(m => m.to === target);
  if (!move) return 'snapback';
  removeHighlights();
  selectedSquare = null;
  if (move.flags.includes('p')) handlePromotion(source, target);
  else executeMove(source, target, 'q');
}

function onSnapEnd() { board.position(chess.fen()); }

function addMoveToList(san) {
  moveCount++;
  const list = document.getElementById('move-list');
  if (moveCount % 2 === 1) {
    const numEl = document.createElement('span');
    numEl.className = 'move-number';
    numEl.textContent = Math.ceil(moveCount / 2) + '. ';
    list.appendChild(numEl);
  }
  const moveEl = document.createElement('span');
  moveEl.className = 'move-item';
  moveEl.textContent = san + ' ';
  list.appendChild(moveEl);
  list.scrollTop = list.scrollHeight;
}

function updatePlayerBar() {
  const myColorChar = myColor === 'white' ? 'w' : 'b';
  const myTurn = chess.turn() === myColorChar;
  document.getElementById('my-bar').classList.toggle('active', myTurn);
  document.getElementById('opponent-bar').classList.toggle('active', !myTurn);
  
  const init = { p: 8, n: 2, b: 2, r: 2, q: 1 };
  const cur = { w: { p:0, n:0, b:0, r:0, q:0 }, b: { p:0, n:0, b:0, r:0, q:0 } };
  let wMat = 0, bMat = 0;
  const pVals = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
  
  chess.board().forEach(row => row.forEach(p => { 
    if(p) { 
      cur[p.color][p.type]++; 
      if(p.color === 'w') wMat += pVals[p.type]; else bMat += pVals[p.type];
    } 
  }));

  const oppColorChar = myColor === 'white' ? 'b' : 'w';
  let myCap = '', oppCap = '';
  const pieceOrder = ['p', 'b', 'n', 'r', 'q'];
  const pIcons = { p: 'fa-chess-pawn', n: 'fa-chess-knight', b: 'fa-chess-bishop', r: 'fa-chess-rook', q: 'fa-chess-queen' };

  for(let type of pieceOrder) {
     for(let i=0; i < (init[type] - cur[oppColorChar][type]); i++) {
        myCap += `<i class="fa-solid ${pIcons[type]}" style="margin-right:2px"></i>`;
     }
     for(let i=0; i < (init[type] - cur[myColorChar][type]); i++) {
        oppCap += `<i class="fa-solid ${pIcons[type]}" style="margin-right:2px"></i>`;
     }
  }
  document.getElementById('my-captured').innerHTML = myCap;
  document.getElementById('opp-captured').innerHTML = oppCap;
}

function startTimer() {
  document.getElementById('my-timer').textContent = fmt.countdown(myTime);
  document.getElementById('opp-timer').textContent = fmt.countdown(oppTime);
  if (mode === 'bot') return;
  timerInterval = setInterval(() => {
    const myColorChar = myColor === 'white' ? 'w' : 'b';
    if (chess.turn() === myColorChar) {
      myTime--;
      const el = document.getElementById('my-timer');
      el.textContent = fmt.countdown(myTime);
      el.classList.toggle('low', myTime < 30);
      if (myTime <= 0) { clearInterval(timerInterval); showResult('timeout_loss'); }
    } else {
      oppTime--;
      const el = document.getElementById('opp-timer');
      el.textContent = fmt.countdown(oppTime);
      el.classList.toggle('low', oppTime < 30 && oppTime > 0);
      if (oppTime <= 0) clearInterval(timerInterval);
    }
  }, 1000);
}

function showResult(reason) {
  clearInterval(timerInterval);
  gameActive = false;
  document.getElementById('result-overlay').classList.add('active');
  const icon = document.getElementById('result-icon');
  const title = document.getElementById('result-title');
  const iqEl = document.getElementById('result-iq');

  if (reason === 'timeout_loss') {
    icon.innerHTML = '<i class="fa-solid fa-clock"></i>'; title.textContent = 'Time Out!'; iqEl.textContent = 'You ran out of time.';
  } else if (chess.in_checkmate()) {
    const won = chess.turn() !== (myColor === 'white' ? 'w' : 'b');
    icon.innerHTML = won ? '<i class="fa-solid fa-trophy"></i>' : '<i class="fa-solid fa-face-frown"></i>';
    title.textContent = won ? 'You Won!' : 'You Lost';
    iqEl.textContent = won ? 'Checkmate!' : 'You were checkmated.';
  } else {
    icon.innerHTML = '<i class="fa-solid fa-handshake"></i>'; title.textContent = 'Draw!'; iqEl.textContent = 'Game ended in a draw.';
  }
}

function resignGame() {
  if (!gameActive) return;
  if (confirm('Resign this match?')) {
    if (mode !== 'bot') SocketActions.resign(matchId, user.id);
    showResult('resigned');
  }
}

function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  appendChat('You', msg, 'me');
  input.value = '';
  if (mode !== 'bot') _socket?.emit('chat_msg', { matchId, username: user.username, message: msg });
}

function appendChat(sender, message, type) {
  const box = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'msg ' + type;
  el.innerHTML = `<div class="msg-name">${sender}</div><div>${message}</div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag])); }

const sock = initSocket();
if (matchId) {
    sock.emit('join_match', { matchId, userId: user.id, isTournament });
}

sock.on('match_sync', (data) => {
  if (data.myColor) myColor = data.myColor;
  if (board) board.orientation(myColor);
  
  if (data.pgn) {
    chess.load_pgn(data.pgn);
    board.position(chess.fen());
    const list = document.getElementById('move-list');
    list.innerHTML = ''; moveCount = 0;
    chess.history().forEach(san => addMoveToList(san));
  }
  myTime = myColor === 'white' ? data.white_time : data.black_time;
  oppTime = myColor === 'white' ? data.black_time : data.white_time;
  updatePlayerBar();
});

sock.on('move_made', (data) => {
  if (data.fen) { chess.load(data.fen); board.position(data.fen); setTimeout(updateLastMoveHighlight, 250); }
  if (data.move) { addMoveToList(data.move.san); removeHighlights(); }
  updatePlayerBar();
  if (chess.game_over()) showResult();
});

sock.on('timer_update', (data) => {
  myTime = myColor === 'white' ? data.white_time : data.black_time;
  oppTime = myColor === 'white' ? data.black_time : data.white_time;
  document.getElementById('my-timer').textContent = fmt.countdown(myTime);
  document.getElementById('opp-timer').textContent = fmt.countdown(oppTime);
});

sock.on('chat_msg', (data) => {
  if (data.username === user.username) return;
  appendChat(data.username || 'Opponent', data.message, 'opp');
});

sock.on('game_over', (data) => {
  clearInterval(timerInterval);
  gameActive = false;
  const won = data.winnerId === user.id;
  const isDraw = data.result === 'draw';
  document.getElementById('result-overlay').classList.add('active');
  document.getElementById('result-icon').innerHTML = isDraw ? '<i class="fa-solid fa-handshake"></i>' : (won ? '<i class="fa-solid fa-trophy"></i>' : '<i class="fa-solid fa-face-frown"></i>');
  document.getElementById('result-title').textContent = isDraw ? 'Draw!' : (won ? 'You Won!' : 'You Lost');
  document.getElementById('result-iq').textContent = data.reason || '';
});

sock.on('tournament_eliminated', () => {
    showEliminationOverlay();
});

initBoard();
gameActive = true;
startTimer();
updatePlayerBar();
</script>
</body>
</html>
