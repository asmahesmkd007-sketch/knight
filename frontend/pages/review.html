<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Review – PHOENIX X</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    .review-layout { display: flex; gap: 24px; align-items: flex-start; max-width: 1100px; margin: 0 auto; }
    .board-section { flex: 1; min-width: 0; }
    .side-panel { width: 340px; display: flex; flex-direction: column; gap: 16px; }
    #board { width: 100%; aspect-ratio: 1; background: var(--bg-card); border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    
    .playback-controls { 
      display: flex; 
      justify-content: center; 
      gap: 10px; 
      padding: 20px; 
      background: var(--bg-card); 
      border: 1px solid var(--border); 
      border-radius: 12px; 
      margin-top: 16px;
    }
    .control-btn {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      border: none;
      background: #333;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .control-btn:hover { background: #444; color: #fff; transform: translateY(-2px); }
    .control-btn:active { transform: translateY(0); }
    .control-btn.active { color: var(--gold); }

    .move-list-card { flex: 1; display: flex; flex-direction: column; max-height: 400px; }
    .move-history { 
      flex: 1; 
      overflow-y: auto; 
      padding: 12px; 
      display: grid; 
      grid-template-columns: 30px 1fr 1fr; 
      gap: 4px;
      font-family: monospace;
      font-size: 14px;
    }
    .move-item { padding: 4px 8px; cursor: pointer; border-radius: 4px; }
    .move-item:hover { background: rgba(255,255,255,0.05); }
    .move-item.current { background: var(--gold); color: #000; font-weight: 700; }
    .move-num { color: var(--text-muted); padding: 4px 0; text-align: right; padding-right: 8px; }

    .match-info-card { padding: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; }
    .player-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .player-row:last-child { margin-bottom: 0; }
    
    .highlight-last-move { background: rgba(255, 255, 0, 0.4) !important; }

    @media (max-width: 900px) {
      .review-layout { flex-direction: column; align-items: center; }
      .side-panel { width: 100%; max-width: 500px; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn btn-secondary btn-sm" onclick="history.back()" style="margin-right:12px"><i class="fa-solid fa-arrow-left"></i></button>
        <div class="page-title">MATCH REVIEW</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-player-id" id="tb-pid">...</div>
      </div>
    </div>

    <div class="page-content">
      <div class="review-layout">
        <div class="board-section">
          <div id="board"></div>
          
          <!-- Playback Controls -->
          <div class="playback-controls">
            <button class="control-btn" title="First Move" onclick="goToMove(0)"><i class="fa-solid fa-backward-step"></i></button>
            <button class="control-btn" title="Previous Move" onclick="prevMove()"><i class="fa-solid fa-chevron-left"></i></button>
            <button class="control-btn" title="Play/Pause" id="play-btn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
            <button class="control-btn" title="Next Move" onclick="nextMove()"><i class="fa-solid fa-chevron-right"></i></button>
            <button class="control-btn" title="Last Move" onclick="goToMove(historyPositions.length - 1)"><i class="fa-solid fa-forward-step"></i></button>
          </div>
        </div>

        <div class="side-panel">
          <div class="match-info-card">
            <div class="player-row">
              <div class="avatar-initial" id="white-avatar">W</div>
              <div style="flex:1">
                <div style="font-weight:700" id="white-name">White Player</div>
                <div style="font-size:11px;color:var(--text-muted)" id="white-iq">IQ: ...</div>
              </div>
              <div id="white-result"></div>
            </div>
            <div style="height:1px;background:var(--border);margin:12px 0"></div>
            <div class="player-row">
              <div class="avatar-initial" id="black-avatar">B</div>
              <div style="flex:1">
                <div style="font-weight:700" id="black-name">Black Player</div>
                <div style="font-size:11px;color:var(--text-muted)" id="black-iq">IQ: ...</div>
              </div>
              <div id="black-result"></div>
            </div>
          </div>

          <div class="card move-list-card">
            <div class="card-title" style="margin-bottom:0">Move History</div>
            <div class="move-history" id="move-history">
              <!-- Moves will be injected here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>

<script>
if (!requireAuth()) throw new Error();
const user = getUser();
loadSidebar();

const params = new URLSearchParams(window.location.search);
const matchId = params.get('id');

let chess = new Chess();
let board = null;
let currentMoveIndex = 0;
let historyPositions = ['rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1'];
let historyMoves = [null];
let moves = [];
let isPlaying = false;
let playInterval = null;

async function loadMatch() {
  if (!matchId) return window.location.href = '/pages/history.html';
  
  const res = await GameAPI.getMatch(matchId);
  if (!res?.success) return;
  
  const m = res.match;
  document.getElementById('white-name').textContent = fmt.username(m.p1?.username || 'White');
  document.getElementById('white-avatar').textContent = (m.p1?.username || 'W').replace('@','')[0].toUpperCase();
  document.getElementById('white-iq').textContent = 'IQ: ' + (m.p1?.iq_level || 0);
  
  document.getElementById('black-name').textContent = fmt.username(m.p2?.username || 'Black');
  document.getElementById('black-avatar').textContent = (m.p2?.username || 'B').replace('@','')[0].toUpperCase();
  document.getElementById('black-iq').textContent = 'IQ: ' + (m.p2?.iq_level || 0);

  // Result badges
  if (m.winner_id === m.player1_id) {
    document.getElementById('white-result').innerHTML = '<span class="badge badge-gold">WIN</span>';
  } else if (m.winner_id === m.player2_id) {
    document.getElementById('black-result').innerHTML = '<span class="badge badge-gold">WIN</span>';
  } else if (m.result === 'draw') {
    document.getElementById('white-result').innerHTML = '<span class="badge">DRAW</span>';
    document.getElementById('black-result').innerHTML = '<span class="badge">DRAW</span>';
  }

  // Process moves
  const rawMoves = Array.isArray(m.moves) ? m.moves : [];
  moves = rawMoves;
  
  const tempChess = new Chess();
  rawMoves.forEach((move, i) => {
    const moveStr = typeof move === 'string' ? move : (move.move || move.san);
    if (!moveStr) return;
    const mResult = tempChess.move(moveStr);
    if (mResult) {
      historyPositions.push(tempChess.fen());
      historyMoves.push({ from: mResult.from, to: mResult.to });
    }
  });

  renderMoveHistory();
  initBoard();
}

function initBoard() {
  board = Chessboard('board', {
    position: 'start',
    draggable: false,
    pieceTheme: (p) => `https://www.chess.com/chess-themes/pieces/neo/150/${p.toLowerCase()}.png`
  });
}

function renderMoveHistory() {
  const container = document.getElementById('move-history');
  container.innerHTML = '';
  
  for (let i = 0; i < moves.length; i += 2) {
    const moveNum = Math.floor(i / 2) + 1;
    
    const numEl = document.createElement('div');
    numEl.className = 'move-num';
    numEl.textContent = moveNum + '.';
    container.appendChild(numEl);
    
    // White Move
    const whiteMove = document.createElement('div');
    whiteMove.className = 'move-item';
    whiteMove.id = `move-${i + 1}`;
    const m1 = moves[i];
    whiteMove.textContent = typeof m1 === 'string' ? m1 : (m1.move || m1.san || '?');
    whiteMove.onclick = () => goToMove(i + 1);
    container.appendChild(whiteMove);
    
    // Black Move
    if (moves[i + 1]) {
      const blackMove = document.createElement('div');
      blackMove.className = 'move-item';
      blackMove.id = `move-${i + 2}`;
      const m2 = moves[i+1];
      blackMove.textContent = typeof m2 === 'string' ? m2 : (m2.move || m2.san || '?');
      blackMove.onclick = () => goToMove(i + 2);
      container.appendChild(blackMove);
    }
  }
}

function goToMove(index) {
  if (index < 0 || index >= historyPositions.length) return;
  currentMoveIndex = index;
  
  // Use animation for better UX
  board.position(historyPositions[currentMoveIndex], true);
  
  updateHighlights(index);
  
  // Highlight in list
  document.querySelectorAll('.move-item').forEach(el => el.classList.remove('current'));
  if (index > 0) {
    const currentEl = document.getElementById(`move-${index}`);
    if (currentEl) {
      currentEl.classList.add('current');
      currentEl.scrollIntoView({ block: 'nearest' });
    }
  }
  
  if (index === historyPositions.length - 1 && isPlaying) {
    stopPlay();
  }
}

function updateHighlights(index) {
  $('#board .square-55d63').removeClass('highlight-last-move');
  const move = historyMoves[index];
  if (move) {
    $('.square-' + move.from).addClass('highlight-last-move');
    $('.square-' + move.to).addClass('highlight-last-move');
  }
}

function nextMove() {
  if (currentMoveIndex < historyPositions.length - 1) {
    goToMove(currentMoveIndex + 1);
  } else if (isPlaying) {
    stopPlay();
  }
}

function prevMove() {
  if (currentMoveIndex > 0) {
    goToMove(currentMoveIndex - 1);
  }
}

function togglePlay() {
  if (isPlaying) {
    stopPlay();
  } else {
    if (currentMoveIndex === historyPositions.length - 1) {
      goToMove(0); // Start from beginning if at the end
    }
    startPlay();
  }
}

function startPlay() {
  isPlaying = true;
  document.getElementById('play-btn').innerHTML = '<i class="fa-solid fa-pause"></i>';
  document.getElementById('play-btn').classList.add('active');
  playInterval = setInterval(nextMove, 1000);
}

function stopPlay() {
  isPlaying = false;
  document.getElementById('play-btn').innerHTML = '<i class="fa-solid fa-play"></i>';
  document.getElementById('play-btn').classList.remove('active');
  clearInterval(playInterval);
}

loadMatch();
</script>
</body>
</html>
