<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clan War | PHOENIX X</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/clan-war.css">
</head>

<body>

  <div class="app-layout">
    <!-- SIDEBAR CONTAINER -->
    <div id="sidebar-container"></div>

    <div class="main-content">
      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-left">
          <div class="page-title">CLAN WAR</div>
        </div>
        <div class="topbar-right">
          <div class="topbar-player-id" id="tb-player-id">PX-SYNCING...</div>
          <div class="topbar-avatar" id="tb-avatar" onclick="window.location='/pages/account.html'">P</div>
        </div>
      </div>

      <div class="page-content">
        <div class="clan-war-container">
          <div class="battle-arena">
            <i class="fa-solid fa-khanda sword sword-left"></i>
            <i class="fa-solid fa-khanda sword sword-right"></i>
          </div>
          <h1 class="clash-text">BATTLE SOON</h1>
          <p class="coming-soon">Prepare your clan for the ultimate war</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js?v=3"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      // Load Sidebar
      const sidebarContainer = document.getElementById('sidebar-container');
      if (sidebarContainer) {
        const resp = await fetch('/components/sidebar.html');
        const html = await resp.text();
        sidebarContainer.innerHTML = html;
        
        // Execute sidebar scripts
        const scripts = sidebarContainer.getElementsByTagName('script');
        for (let i = 0; i < scripts.length; i++) {
          const script = document.createElement('script');
          script.text = scripts[i].text;
          document.body.appendChild(script);
        }
      }

      // Update UI with user data if logged in
      const user = getUser();
      if (user) {
        document.getElementById('tb-player-id').textContent = user.player_id || 'PX-SYNCING...';
        const avatarHtml = user.profile_image
          ? `<img src="${user.profile_image}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
          : (user.username || 'P').replace('@', '')[0].toUpperCase();
        document.getElementById('tb-avatar').innerHTML = avatarHtml;
        
        if (typeof updateSidebarUI === 'function') updateSidebarUI(user);
      }
    });
  </script>

</body>

</html>
